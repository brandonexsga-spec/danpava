<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>INCENDIOS DANPAVA - NUBE</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&family=Barlow+Condensed:wght@700;900&display=swap');

:root {
  --verde: #1b4332; --verde-m: #2d6a4f; --verde-c: #52b788; --verde-s: #d8f3dc;
  --naranja: #e76f51; --rojo: #b91c1c; --fondo: #eef2f3;
  --borde: #a0aec0; --txt: #0f172a; --gris: #475569;
  --radio: 20px; --sombra: 0 15px 25px rgba(0,0,0,0.15);
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Barlow', sans-serif; }
body { background: var(--fondo); color: var(--txt); padding-bottom: 120px; font-size: 16px; }

header { background: var(--verde); color: white; padding: 20px; text-align: center; border-bottom: 6px solid var(--verde-c); }
header h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 1.6rem; letter-spacing: 2px; text-transform: uppercase; font-weight: 900; }

.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 20px; }
.stat-card { background: white; padding: 15px 10px; border-radius: var(--radio); text-align: center; box-shadow: var(--sombra); border-bottom: 8px solid var(--verde); }
.stat-val { display: block; font-size: 2.2rem; font-weight: 800; color: var(--verde); line-height: 0.9; margin-bottom: 5px; }
.stat-lbl { font-size: 0.75rem; text-transform: uppercase; color: var(--gris); font-weight: 800; letter-spacing: 1px; }

.map-container { height: 600px; margin: 0 20px 25px; border-radius: var(--radio); overflow: hidden; box-shadow: var(--sombra); border: 8px solid white; position: relative; }
#map-dash, #map-alta, #map-inc { height: 100%; width: 100%; background: #d1d5db; }

.sub-nav { display: flex; background: #cbd5e0; margin: 20px; border-radius: 15px; padding: 6px; gap: 6px; }
.sub-nav button { flex: 1; padding: 12px 8px; border: none; border-radius: 12px; background: transparent; font-weight: 800; font-size: 0.9rem; cursor: pointer; color: var(--gris); transition: 0.3s; }
.sub-nav button.active { background: white; color: var(--verde); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

.sec { display: none; padding: 0 20px; max-width: 1000px; margin: auto; }
.sec.active { display: block; animation: slideUp 0.4s ease-out; }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.card { background: white; padding: 25px; border-radius: var(--radio); box-shadow: var(--sombra); margin-bottom: 25px; border: 1px solid #e2e8f0; }
.campo { margin-bottom: 20px; }
.campo label { display: block; font-weight: 800; margin-bottom: 8px; font-size: 1rem; color: var(--verde); text-transform: uppercase; }
input, select, textarea { width: 100%; padding: 14px; border: 3px solid var(--borde); border-radius: 15px; font-size: 1.1rem; color: #000; font-weight: 600; background: #fff; }

.info-banner { background: var(--verde-s); padding: 15px; border-radius: 15px; margin-bottom: 25px; border-left: 10px solid var(--verde); display: flex; flex-direction: column; gap: 8px; }

.grid-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.btn-check { padding: 15px; border: 3px solid var(--borde); border-radius: 15px; background: white; font-size: 0.9rem; font-weight: 800; cursor: pointer; text-transform: uppercase; }
.btn-check.selected { background: var(--verde); color: white; border-color: var(--verde); }

.btn-main { width: 100%; padding: 20px; background: var(--verde); color: white; border: none; border-radius: 18px; font-weight: 900; font-size: 1.2rem; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.2); text-transform: uppercase; }
.btn-rojo { background: var(--rojo); }

.monitor-item { border-left: 12px solid var(--rojo); margin-bottom: 20px; padding: 20px; background: #fff; border-radius: var(--radio); box-shadow: var(--sombra); }
.monitor-item.bri { border-left-color: var(--verde); }

.progress-container { margin: 15px 0; }
.progress-label { display: flex; justify-content: space-between; font-size: 0.9rem; font-weight: 800; margin-bottom: 6px; }
.progress-bar { background: #e2e8f0; height: 20px; border-radius: 12px; overflow: hidden; border: 1px solid #cbd5e0; }
.progress-fill { height: 100%; transition: width 0.6s ease; }

nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 85px; box-shadow: 0 -8px 20px rgba(0,0,0,0.15); z-index: 2000; border-top: 1px solid #e2e8f0; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.8rem; color: var(--gris); font-weight: 800; cursor: pointer; text-transform: uppercase; }
.nav-item.active { color: var(--verde); border-top: 6px solid var(--verde); background: #f8fafc; }
.nav-item span { font-size: 1.8rem; }

#toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 15px 30px; border-radius: 50px; z-index: 4000; display: none; font-weight: 800; }
#modal-update { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
.modal-content { background: white; width: 100%; max-width: 600px; padding: 30px; border-radius: var(--radio); }
</style>
</head>
<body>

<header><h1>INCENDIOS DANPAVA</h1></header>
<div id="toast"></div>

<div id="sec-monitor" class="sec active">
  <div class="stats">
    <div class="stat-card"><span class="stat-val" id="d-inc">0</span><span class="stat-lbl">Incendios</span></div>
    <div class="stat-card"><span class="stat-val" id="d-bri">0</span><span class="stat-lbl">Brigadas</span></div>
    <div class="stat-card"><span class="stat-val" id="d-per">0</span><span class="stat-lbl">Personal</span></div>
  </div>
  <div class="map-container"><div id="map-dash"></div></div>
  <div class="sub-nav">
    <button id="btn-tab-inc" class="active" onclick="cambiarTabMonitor('inc')">🔥 INCENDIOS ACTIVOS</button>
    <button id="btn-tab-bri" onclick="cambiarTabMonitor('bri')">👩‍🚒 BRIGADAS EN CAMPO</button>
  </div>
  <div id="tab-incendios"></div>
  <div id="tab-brigadas" style="display:none;"></div>
</div>

<div id="sec-registro-bri" class="sec">
  <div class="sub-nav">
    <button id="btn-tab-in" class="active" onclick="cambiarTabBrigada('in')">📥 ENTRADA</button>
    <button id="btn-tab-out" onclick="cambiarTabBrigada('out')">📤 SALIDA</button>
  </div>
  <div id="panel-checkin">
    <div class="card">
      <div class="campo">
        <label>Área Natural Protegida (ANP)</label>
        <select id="a-anp">
          <option>Desierto de los Leones</option>
          <option>Insurgente Miguel Hidalgo y Costilla (La Venta)</option>
          <option>El Tepeyac</option>
          <option>Fuentes Brotantes de Tlalpan</option>
          <option>Lomas de Padierna</option>
          <option>Cerro de la Estrella</option>
          <option>Cumbres del Ajusco</option>
          <option>Sierra de Guadalupe</option>
          <option>Bosque de Tlalpan</option>
          <option>Ejidos de Xochimilco y San Gregorio Atlapulco</option>
          <option>Sierra de Santa Catarina</option>
          <option>La Armella</option>
          <option>La Loma</option>
          <option>Cerro de la Herrada</option>
          <option>Parque Ecológico de la Ciudad de México</option>
          <option>San Nicolás Totolapan</option>
          <option>El Borracho</option>
          <option>Paso de Cortés</option>
          <option>Sierra del Ajusco-Chichinautzin</option>
          <option>Canal Nacional-Calzada del Hueso</option>
          <option>Bosque de Chapultepec</option>
          <option>Bosque de San Juan de Aragón</option>
          <option>Zonas Chinamperas</option>
          <option>Cerro de San Miguel</option>
          <option>Tempiluli</option>
          <option>ZVT Tláhuac</option>
          <option>Reserva Ecológica del Pedregal de San Ángel</option>
        </select>
      </div>
      <div class="campo"><label>Paraje</label><input type="text" id="a-paraje" placeholder="Ubicación específica"></div>
      <div class="campo"><label>Ubicación (Toca Mapa)</label><div style="height:350px; border-radius:15px;" id="map-alta"></div></div>
      <div class="campo"><label>Nombre Brigada</label><input type="text" id="a-nombre" placeholder="Nombre o ID"></div>
      <div class="campo"><label>Elementos</label><input type="number" id="a-elementos" value="1"></div>
      <div class="campo">
        <label>Actividad</label>
        <div class="grid-btns" id="a-acts">
          <button class="btn-check" onclick="selAct(this)">Vigilancia</button>
          <button class="btn-check" onclick="selAct(this)">Combate</button>
          <button class="btn-check" onclick="selAct(this)">Mantenimiento</button>
          <button class="btn-check" onclick="selAct(this)">Operativo</button>
        </div>
      </div>
      <button class="btn-main" onclick="registrarCheckIn()">ENVIAR REPORTE</button>
    </div>
  </div>
  <div id="panel-checkout" style="display:none;"><div id="lista-checkout"></div></div>
</div>

<div id="sec-registro-inc" class="sec">
  <div class="card">
    <h2 style="color:var(--rojo); text-align:center; margin-bottom:15px;">🔥 REPORTE SINIESTRO</h2>
    <div class="campo"><label>Paraje</label><input type="text" id="i-paraje"></div>
    <div class="campo"><label>Localización (Toca Mapa)</label><div style="height:350px; border-radius:15px;" id="map-inc"></div></div>
    <div class="campo"><label>Brigada Responsable</label><input type="text" id="i-bri"></div>
    <div class="campo"><label>Elementos iniciales</label><input type="number" id="i-ele" value="1"></div>
    <button class="btn-main btn-rojo" onclick="registrarIncendio()">ALTA DE INCENDIO</button>
  </div>
</div>

<div id="modal-update">
  <div class="modal-content">
    <h3>ACTUALIZAR AVANCE</h3>
    <div class="campo"><label id="lbl-c">Control: 0%</label><input type="range" id="m-ctrl" min="0" max="100" oninput="document.getElementById('lbl-c').innerText='Control: '+this.value+'%'"></div>
    <div class="campo"><label id="lbl-l">Liquidación: 0%</label><input type="range" id="m-liq" min="0" max="100" oninput="document.getElementById('lbl-l').innerText='Liquidación: '+this.value+'%'"></div>
    <div class="campo"><label>Novedades</label><textarea id="m-nov"></textarea></div>
    <button class="btn-main" onclick="guardarUpdate()">GUARDAR</button>
    <button class="btn-main" style="background:#ccc; margin-top:10px" onclick="cerrarModal()">CERRAR</button>
  </div>
</div>

<nav>
  <div class="nav-item active" onclick="verSec('monitor')"><span>📊</span>Monitor</div>
  <div class="nav-item" onclick="verSec('registro-bri')"><span>📋</span>Brigadas</div>
  <div class="nav-item" onclick="verSec('registro-inc')"><span>🔥</span>Incendios</div>
</nav>

<script>
// ==========================================
// CONFIGURACIÓN FIREBASE (Tus datos aplicados)
// ==========================================
const firebaseConfig = {
    apiKey: "AIzaSyDRDQ1GwnQihrgJScdM9RtVGp5GzHoTgec",
    authDomain: "incendios-danpava.firebaseapp.com",
    projectId: "incendios-danpava",
    storageBucket: "incendios-danpava.firebasestorage.app",
    messagingSenderId: "431467025348",
    appId: "1:431467025348:web:8495d76946e79f1f910a91",
    databaseURL: "https://incendios-danpava-default-rtdb.firebaseio.com/" // Generada automáticamente
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ==========================================
// MAPAS Y LÓGICA
// ==========================================
let mapDash, mapAlta, mapInc, mAlta, mInc, latA, lonA, latI, lonI, editId;

function initMaps() {
  const center = [19.32, -99.14];
  mapDash = L.map('map-dash').setView(center, 11);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(mapDash);

  mapAlta = L.map('map-alta').setView(center, 11);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mapAlta);
  mapAlta.on('click', e => {
    if(mAlta) mAlta.setLatLng(e.latlng); else mAlta = L.marker(e.latlng).addTo(mapAlta);
    latA = e.latlng.lat; lonA = e.latlng.lng;
  });

  mapInc = L.map('map-inc').setView(center, 11);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(mapInc);
  mapInc.on('click', e => {
    if(mInc) mInc.setLatLng(e.latlng); else mInc = L.marker(e.latlng).addTo(mapInc);
    latI = e.latlng.lat; lonI = e.latlng.lng;
  });
}

// Sincronización en tiempo real
db.ref('brigadas').on('value', snapshot => {
  const list = [];
  snapshot.forEach(child => { if(child.val().est === 'aire') list.push(child.val()); });
  renderBrigadas(list);
  actualizarStats();
});

db.ref('incendios').on('value', snapshot => {
  const list = [];
  snapshot.forEach(child => { if(child.val().est === 'activo') list.push(child.val()); });
  renderIncendios(list);
  actualizarStats();
});

function registrarCheckIn() {
  const nom = document.getElementById('a-nombre').value, act = document.querySelector('#a-acts .selected')?.innerText;
  if(!nom || !act || !latA) return toast('FALTAN DATOS O UBICACIÓN', 1);
  const id = Date.now();
  db.ref('brigadas/' + id).set({
    id, nom, act, lat: latA, lon: lonA, est: 'aire',
    anp: document.getElementById('a-anp').value,
    par: document.getElementById('a-paraje').value,
    ele: parseInt(document.getElementById('a-elementos').value),
    h: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
  });
  toast('REGISTRADO CORRECTAMENTE');
  verSec('monitor');
}

function registrarIncendio() {
  const par = document.getElementById('i-paraje').value;
  if(!latI || !par) return toast('MARCA EL PUNTO EN EL MAPA', 1);
  const id = Date.now();
  db.ref('incendios/' + id).set({
    id, par, lat: latI, lon: lonI, est: 'activo', c: 0, l: 0,
    bri: document.getElementById('i-bri').value,
    ele: document.getElementById('i-ele').value,
    h: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
  });
  toast('INCENDIO REPORTADO');
  verSec('monitor');
}

function guardarUpdate() {
  db.ref('incendios/' + editId).update({
    c: parseInt(document.getElementById('m-ctrl').value),
    l: parseInt(document.getElementById('m-liq').value),
    n: document.getElementById('m-nov').value,
    est: document.getElementById('m-liq').value == 100 ? 'liquidado' : 'activo'
  });
  cerrarModal();
}

function checkout(id) {
  db.ref('brigadas/' + id).update({ est: 'fin' });
}

function renderBrigadas(list) {
  document.getElementById('tab-brigadas').innerHTML = list.map(b => `
    <div class="monitor-item bri">
      <h3>👩‍🚒 ${b.nom}</h3>
      <p>${b.anp} - ${b.par}</p>
    </div>
  `).join('') || '<p style="text-align:center;padding:20px;">No hay brigadas en campo</p>';
  
  document.getElementById('lista-checkout').innerHTML = list.map(b => `
    <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
      <b>${b.nom}</b> <button onclick="checkout(${b.id})" style="padding:10px;border-radius:10px;background:var(--rojo);color:white;border:none;">SALIDA</button>
    </div>
  `).join('');
}

function renderIncendios(list) {
  document.getElementById('tab-incendios').innerHTML = list.map(i => `
    <div class="monitor-item">
      <h3>🔥 ${i.par}</h3>
      <div class="progress-bar"><div class="progress-fill" style="width:${i.c}%; background:var(--rojo)"></div></div>
      <button class="btn-main" style="padding:10px; margin-top:10px" onclick="abrirMod(${i.id})">ACTUALIZAR</button>
    </div>
  `).join('') || '<p style="text-align:center;padding:20px;">No hay incendios activos</p>';
  actualizarMapa(list);
}

function actualizarMapa(list) {
  mapDash.eachLayer(l => { if(l instanceof L.Marker) mapDash.removeLayer(l); });
  list.forEach(i => L.marker([i.lat, i.lon]).addTo(mapDash).bindPopup(i.par));
}

function actualizarStats() {
    db.ref('incendios').once('value', s1 => {
        db.ref('brigadas').once('value', s2 => {
            let ni=0, nb=0, np=0;
            s1.forEach(c => { if(c.val().est==='activo') ni++; });
            s2.forEach(c => { if(c.val().est==='aire') { nb++; np+=c.val().ele; } });
            document.getElementById('d-inc').innerText = ni;
            document.getElementById('d-bri').innerText = nb;
            document.getElementById('d-per').innerText = np;
        });
    });
}

function verSec(id) {
  document.querySelectorAll('.sec').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  if(event) event.currentTarget.classList.add('active');
  setTimeout(() => { mapDash.invalidateSize(); mapAlta.invalidateSize(); mapInc.invalidateSize(); }, 300);
}

function abrirMod(id) {
  editId = id;
  db.ref('incendios/'+id).once('value', s => {
    const i = s.val();
    document.getElementById('m-ctrl').value = i.c;
    document.getElementById('m-liq').value = i.l;
    document.getElementById('m-nov').value = i.n || '';
    document.getElementById('modal-update').style.display = 'flex';
  });
}

window.onload = initMaps;
function selAct(b) { b.parentElement.querySelectorAll('button').forEach(x => x.classList.remove('selected')); b.classList.add('selected'); }
function cerrarModal() { document.getElementById('modal-update').style.display = 'none'; }
function toast(m, e=0) { const t=document.getElementById('toast'); t.innerText=m; t.style.background=e?'#b91c1c':'#1e293b'; t.style.display='block'; setTimeout(()=>t.style.display='none', 2000); }
function cambiarTabMonitor(t) {
  document.getElementById('tab-incendios').style.display = t==='inc'?'block':'none';
  document.getElementById('tab-brigadas').style.display = t==='bri'?'block':'none';
  document.getElementById('btn-tab-inc').className = t==='inc'?'active':'';
  document.getElementById('btn-tab-bri').className = t==='bri'?'active':'';
}
function cambiarTabBrigada(t) {
  document.getElementById('panel-checkin').style.display = t==='in'?'block':'none';
  document.getElementById('panel-checkout').style.display = t==='out'?'block':'none';
  document.getElementById('btn-tab-in').className = t==='in'?'active':'';
  document.getElementById('btn-tab-out').className = t==='out'?'active':'';
}
</script>
</body>
</html>
